<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Sales Dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
body{font-family:Segoe UI;background:#f5f5f5;padding:40px}
.container{width:520px;margin:auto;background:#fff;padding:30px;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.15);text-align:center}
button{padding:10px 20px;background:#1565c0;color:#fff;border:none;border-radius:5px;cursor:pointer}
</style></head>
<body>
<div class="container">
<h2>Sales Performance Dashboard</h2>
<input type="file" id="jsonFile" accept=".json"><br><br>
<button onclick="openDashboard()">Generate Dashboard</button>
</div>
<script>
function openDashboard(){
const file=document.getElementById("jsonFile").files[0];
if(!file){alert("Please select a JSON file.");return;}
const r=new FileReader();
r.onload=e=>{
const json=e.target.result;
const w=window.open("");
w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>Dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"><\/script>
<style>
body{font-family:Segoe UI;margin:20px;background:#fafafa}
select{padding:8px;margin-bottom:15px}
table{border-collapse:collapse;width:100%}
th{background:#4da3ff;color:#fff;padding:8px}
td{border:1px solid #ddd;padding:8px;text-align:center}
tfoot{font-weight:bold;background:#eee}
#chart{height:450px;margin-top:30px}
</style></head><body>
<h2>Sales Performance Dashboard</h2>
<label><b>Business Head:</b></label>
<select id="bh"></select>
<div id="pivot"></div><div id="chart"></div>
<script>
const data=${json};
const dd=document.getElementById("bh");
const heads=[...new Set(data.map(x=>x["Business Head"]))];
dd.innerHTML="<option>All</option>"+heads.map(h=>"<option>"+h+"</option>").join("");
dd.onchange=render;
render();
function render(){
const f=dd.value==="All"?data:data.filter(x=>x["Business Head"]===dd.value);
const p={};let tc=0,tq=0,tv=0;
f.forEach(r=>{
const z=r["ZM Name"]||"Blank";
if(!p[z])p[z]={c:0,q:0,v:0};
p[z].c++;p[z].q+=+r.SuggestedOrder||0;p[z].v+=+r.OrderValue||0;
});
let rows="",x=[],y=[];
Object.keys(p).sort().forEach(z=>{
const a=p[z];tc+=a.c;tq+=a.q;tv+=a.v;x.push(z);y.push(a.v);
rows+=\`<tr><td>\${z}</td><td>\${a.c.toLocaleString()}</td><td>\${a.q.toLocaleString()}</td><td>\${a.v.toLocaleString()}</td></tr>\`;
});
document.getElementById("pivot").innerHTML=
\`<table><thead><tr><th>ZM Name</th><th>Count of DealerName</th><th>Suggested Order</th><th>Order Value</th></tr></thead>
<tbody>\${rows}</tbody><tfoot><tr><td>Grand Total</td><td>\${tc.toLocaleString()}</td><td>\${tq.toLocaleString()}</td><td>\${tv.toLocaleString()}</td></tr></tfoot></table>\`;
Plotly.newPlot("chart",[{x:x,y:y,type:"bar"}],{title:"Order Value by ZM"});
}
<\/script></body></html>`);
};
r.readAsText(file);
}
</script>
</body></html>
